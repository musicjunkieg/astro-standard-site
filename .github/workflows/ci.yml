name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: test (Node ${{ matrix.node-version }}, Astro ${{ matrix.astro-version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: '20'
            astro-version: '5'
          - node-version: '22'
            astro-version: '6'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Pin Astro ${{ matrix.astro-version }}
        run: npm install --no-save astro@${{ matrix.astro-version }}

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
